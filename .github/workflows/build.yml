name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decrypt keystore
        env:
          ENC_PASSPHRASE: ${{ secrets.KEYSTORE_ENC_PASSPHRASE }}
        run: |
          openssl enc -d -aes-256-cbc -pbkdf2 \
            -in android/app/release.jks.enc \
            -out android/app/release.jks \
            -pass env:ENC_PASSPHRASE
          echo "Keystore size: $(wc -c < android/app/release.jks) bytes"
          echo "Keystore absolute path: $(realpath android/app/release.jks)"

      - name: Build signed release APK
        run: flutter build apk --release
        env:
          KEYSTORE_PATH: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WatchTracker-v${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30