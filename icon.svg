<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="0" fill="#1C1C1E"/>

  <!-- Strap lugs top -->
  <rect x="218" y="28" width="76" height="52" rx="12" fill="#2A2A2C"/>
  <!-- Strap lugs bottom -->
  <rect x="218" y="432" width="76" height="52" rx="12" fill="#2A2A2C"/>

  <!-- Crown -->
  <rect x="468" y="228" width="28" height="56" rx="8" fill="#2A2A2C"/>
  <rect x="472" y="234" width="20" height="44" rx="6" fill="#3A3A3C"/>

  <!-- Outer bezel -->
  <circle cx="256" cy="256" r="196" fill="#2C2C2E"/>
  <!-- Gold ring -->
  <circle cx="256" cy="256" r="188" fill="none" stroke="#B8860B" stroke-width="10"/>
  <!-- Watch face -->
  <circle cx="256" cy="256" r="172" fill="#111111"/>

  <!-- Hour tick marks (12 positions) -->
  <g stroke="#B8860B" stroke-width="6" stroke-linecap="round">
    <line x1="256" y1="96"  x2="256" y2="124" transform="rotate(0   256 256)"/>
    <line x1="256" y1="96"  x2="256" y2="124" transform="rotate(30  256 256)"/>
    <line x1="256" y1="96"  x2="256" y2="124" transform="rotate(60  256 256)"/>
    <line x1="256" y1="96"  x2="256" y2="124" transform="rotate(90  256 256)"/>
    <line x1="256" y1="96"  x2="256" y2="124" transform="rotate(120 256 256)"/>
    <line x1="256" y1="96"  x2="256" y2="124" transform="rotate(150 256 256)"/>
    <line x1="256" y1="96"  x2="256" y2="124" transform="rotate(180 256 256)"/>
    <line x1="256" y1="96"  x2="256" y2="124" transform="rotate(210 256 256)"/>
    <line x1="256" y1="96"  x2="256" y2="124" transform="rotate(240 256 256)"/>
    <line x1="256" y1="96"  x2="256" y2="124" transform="rotate(270 256 256)"/>
    <line x1="256" y1="96"  x2="256" y2="124" transform="rotate(300 256 256)"/>
    <line x1="256" y1="96"  x2="256" y2="124" transform="rotate(330 256 256)"/>
  </g>

  <!-- Minor tick marks (48 positions, skipping the 12 major ones) -->
  <g stroke="#444444" stroke-width="3" stroke-linecap="round">
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(6   256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(12  256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(18  256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(24  256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(36  256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(42  256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(48  256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(54  256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(66  256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(72  256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(78  256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(84  256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(96  256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(102 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(108 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(114 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(126 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(132 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(138 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(144 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(156 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(162 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(168 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(174 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(186 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(192 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(198 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(204 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(216 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(222 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(228 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(234 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(246 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(252 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(258 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(264 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(276 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(282 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(288 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(294 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(306 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(312 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(318 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(324 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(336 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(342 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(348 256 256)"/>
    <line x1="256" y1="96" x2="256" y2="112" transform="rotate(354 256 256)"/>
  </g>

  <!-- Hour hand (~10 o'clock position) -->
  <line x1="256" y1="256" x2="188" y2="166"
        stroke="#EEEEEE" stroke-width="12" stroke-linecap="round"/>
  <!-- Minute hand (~2 o'clock position) -->
  <line x1="256" y1="256" x2="326" y2="138"
        stroke="#EEEEEE" stroke-width="9" stroke-linecap="round"/>
  <!-- Seconds hand (just past 12) -->
  <line x1="256" y1="256" x2="262" y2="110"
        stroke="#B8860B" stroke-width="4" stroke-linecap="round"/>
  <!-- Seconds counterweight -->
  <line x1="256" y1="256" x2="250" y2="296"
        stroke="#B8860B" stroke-width="4" stroke-linecap="round"/>

  <!-- Center jewel -->
  <circle cx="256" cy="256" r="10" fill="#B8860B"/>
  <circle cx="256" cy="256" r="5"  fill="#1C1C1E"/>
</svg>
