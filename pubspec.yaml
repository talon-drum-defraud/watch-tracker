name: watch_tracker
description: Mechanical watch accuracy tracker against atomic time.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.2
  path: ^1.9.1
  http: ^1.4.0
  ntp: ^2.0.0
  fl_chart: ^0.70.2
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.1
  intl: ^0.20.2
  uuid: ^4.5.1
  provider: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
